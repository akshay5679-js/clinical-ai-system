{% extends 'base.html' %}

{% block content %}

<h2>Medical AI Assistant</h2>

<div id="chat-box">
    {% if answer %}
        <div class="bot-answer">
            <strong>AI:</strong> {{ answer }}
        </div>
    {% endif %}
</div>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="question" placeholder="Ask a medical question..." required>
    <button type="submit">Send</button>
</form>

<style>

#chat-box{
    width:600px;
    height:300px;
    border:1px solid #ccc;
    margin-bottom:20px;
    padding:10px;
    overflow-y:scroll;
}

form input{
    width:70%;
    padding:10px;
}

form button{
    padding:10px;
}

.bot-answer{
    margin-top:20px;
    background:#f3f3f3;
    padding:10px;
}

</style>

{% endblock %}
