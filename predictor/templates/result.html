<h2>Heart Disease Prediction Result</h2>

{% if prediction == 1 %}
<h3 style="color:red;">High Risk of Heart Disease</h3>
{% else %}
<h3 style="color:green;">Low Risk of Heart Disease</h3>
{% endif %}

<h3>Explainable AI Result</h3>

<table border="1">

<tr>
<th>Feature</th>
<th>Impact</th>
</tr>

{% for key,value in explanation.items %}

<tr>
<td>{{ key }}</td>
<td>{{ value }}</td>
</tr>

{% endfor %}

</table>
